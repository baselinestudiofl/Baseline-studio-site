    // ============ ONBOARDING WIZARD ============
    // Smart: only asks questions for fields that are actually missing from event data.
    // If everything is already filled in from intake, skips the wizard entirely.

    let _obStep = -1;       // -1 = welcome screen, 0+ = index into _obStepList
    let _obStepList = [];   // dynamic list of step names that need to be asked

    function _obGetPendingSteps() {
      const steps = [];
      // Only ask if the field is genuinely blank / missing
      const hasType = currentEvent.type && currentEvent.type !== 'event' && currentEvent.type !== '';
      const hasVibe = !!(currentEvent.clientPrefs && currentEvent.clientPrefs.vibe);
      const hasVenue = !!(currentEvent.venueName || currentEvent.venue);
      const hasMoments = !!(currentEvent.clientPrefs && currentEvent.clientPrefs.moments && currentEvent.clientPrefs.moments.length);
      const hasSpecial = !!(currentEvent.clientPrefs && currentEvent.clientPrefs.specialRequests);

      if (!hasType)    steps.push('type');
      if (!hasVibe)    steps.push('vibe');
      if (!hasVenue)   steps.push('venue');
      if (!hasMoments) steps.push('moments');
      if (!hasSpecial) steps.push('special');
      return steps;
    }

    function renderOnboarding() {
      _obStepList = _obGetPendingSteps();

      // Nothing missing — mark complete immediately and skip the wizard
      if (_obStepList.length === 0) {
        _obComplete(true);
        return;
      }

      document.getElementById('tabBar').style.display = 'none';
      _obStep = -1; // start at welcome
      _obRenderStep();
    }

    function _obRenderStep() {
      if (_obStep === -1) { _obWelcome(); return; }
      const name = _obStepList[_obStep];
      if (!name) { _obComplete(false); return; }
      const fns = { type: _obType, vibe: _obVibe, venue: _obVenue, moments: _obMoments, special: _obSpecial };
      if (fns[name]) fns[name]();
    }

    function _obNext() { _obStep++; _obRenderStep(); }

    function _obDots(currentIdx) {
      const total = _obStepList.length;
      return '<div class="ob-progress">' +
        Array.from({ length: total }, (_, i) => {
          let cls = 'ob-dot';
          if (i < currentIdx) cls += ' done';
          else if (i === currentIdx) cls += ' active';
          return '<div class="' + cls + '"></div>';
        }).join('') +
      '</div>';
    }

    function _obWelcome() {
      const eventName = currentEvent.name || currentEvent.title || 'your event';
      const count = _obStepList.length;
      const timeEst = count <= 2 ? 'under a minute' : 'about two minutes';
      document.getElementById('contentArea').innerHTML = `
        <div class="ob-wrap">
          <div class="ob-welcome-wrap">
            <div class="ob-welcome-title">Welcome to your portal.</div>
            <div class="ob-welcome-body">
              We've got ${eventName} locked in on our end. We just have ${count === 1 ? 'one quick question' : count + ' quick things'} for you — ${timeEst} — and it helps us make sure the night goes exactly how you want it.
            </div>
            <button class="ob-next" onclick="_obStep=0;_obRenderStep();" style="font-size:16px;padding:14px 40px;">Let's do it →</button>
            <div style="margin-top:18px;">
              <button class="ob-skip" onclick="_obComplete(true)">Skip for now — just take me in</button>
            </div>
          </div>
        </div>`;
    }

    function _obType() {
      const idx = _obStepList.indexOf('type');
      const types = ['Wedding','Quinceañera','Bar / Bat Mitzvah','Corporate Event','Birthday Party','Gala','Other'];
      const cur = (currentEvent.type || '').toLowerCase();
      document.getElementById('contentArea').innerHTML = `
        <div class="ob-wrap">
          ${_obDots(idx)}
          <div class="ob-question">What kind of event are we doing together?</div>
          <div class="ob-sub">Just confirm the type — we'll tailor everything around it.</div>
          <div class="ob-chips" id="obTypeChips">
            ${types.map(t => `<div class="ob-chip ${cur && t.toLowerCase().startsWith(cur.split(' ')[0]) ? 'selected' : ''}" data-val="${t}" onclick="_obPickChip(this,'obTypeChips')">${t}</div>`).join('')}
          </div>
          <div class="ob-actions">
            <button class="ob-skip" onclick="_obNext()">Skip this</button>
            <button class="ob-next" onclick="_obSaveType()">Next →</button>
          </div>
        </div>`;
    }

    function _obPickChip(el, containerId) {
      document.getElementById(containerId).querySelectorAll('.ob-chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }

    function _obSaveType() {
      const sel = document.querySelector('#obTypeChips .ob-chip.selected');
      if (sel) { currentEvent.type = sel.dataset.val; saveEvent(); }
      _obNext();
    }

    function _obVibe() {
      const idx = _obStepList.indexOf('vibe');
      const vibes = ['Romantic & Intimate','Grand & Dramatic','Fun & High-Energy','Sophisticated & Elegant','Modern & Bold','Something Else'];
      const cur = (currentEvent.clientPrefs && currentEvent.clientPrefs.vibe) || '';
      document.getElementById('contentArea').innerHTML = `
        <div class="ob-wrap">
          ${_obDots(idx)}
          <div class="ob-question">What's the overall vibe?</div>
          <div class="ob-sub">One answer — go with your gut. You can always update it later.</div>
          <div class="ob-chips" id="obVibeChips">
            ${vibes.map(v => `<div class="ob-chip ${cur === v ? 'selected' : ''}" data-val="${v}" onclick="_obPickChip(this,'obVibeChips')">${v}</div>`).join('')}
          </div>
          <div class="ob-actions">
            <button class="ob-skip" onclick="_obNext()">Skip this</button>
            <button class="ob-next" onclick="_obSaveVibe()">Next →</button>
          </div>
        </div>`;
    }

    function _obSaveVibe() {
      const sel = document.querySelector('#obVibeChips .ob-chip.selected');
      if (sel) {
        if (!currentEvent.clientPrefs) currentEvent.clientPrefs = {};
        currentEvent.clientPrefs.vibe = sel.dataset.val;
        saveEvent();
      }
      _obNext();
    }

    function _obVenue() {
      const idx = _obStepList.indexOf('venue');
      const venueName = currentEvent.venueName || currentEvent.venue || '';
      const venueAddr = currentEvent.venueAddress || '';
      document.getElementById('contentArea').innerHTML = `
        <div class="ob-wrap">
          ${_obDots(idx)}
          <div class="ob-question">Where's it happening?</div>
          <div class="ob-sub">Just the name for now — address and contact details can come later.</div>
          <input class="ob-input-large" type="text" id="obVenueName" placeholder="Venue name (e.g., The Biltmore, Pérez Art Museum)" value="${venueName.replace(/"/g,'&quot;')}">
          <input class="ob-input-large" type="text" id="obVenueAddr" placeholder="Address (optional)" value="${venueAddr.replace(/"/g,'&quot;')}">
          <div class="ob-actions">
            <button class="ob-skip" onclick="_obNext()">Skip this</button>
            <button class="ob-next" onclick="_obSaveVenue()">Next →</button>
          </div>
        </div>`;
      requestAnimationFrame(() => document.getElementById('obVenueName').focus());
    }

    function _obSaveVenue() {
      const name = document.getElementById('obVenueName').value.trim();
      const addr = document.getElementById('obVenueAddr').value.trim();
      if (name) { currentEvent.venueName = name; currentEvent.venue = name; }
      if (addr) currentEvent.venueAddress = addr;
      if (name || addr) saveEvent();
      _obNext();
    }

    function _obMoments() {
      const idx = _obStepList.indexOf('moments');
      const all = ['First Dance','Grand Entrance','Parent Dances','Cake Cutting','Toasts','Cocktail Hour','Anniversary Dance','Bouquet Toss','Surprise Dance','Candle Ceremony'];
      const cur = (currentEvent.clientPrefs && currentEvent.clientPrefs.moments) || [];
      document.getElementById('contentArea').innerHTML = `
        <div class="ob-wrap">
          ${_obDots(idx)}
          <div class="ob-question">Which moments matter most to you?</div>
          <div class="ob-sub">We'll build your run of show around these. Pick as many as you want.</div>
          <div class="ob-checkbox-grid">
            ${all.map(m => `
              <div class="ob-check-item ${cur.includes(m) ? 'checked' : ''}" data-val="${m}" onclick="_obToggleCheckItem(this)">
                <div class="ob-check-box">${cur.includes(m) ? '✓' : ''}</div>
                <span>${m}</span>
              </div>`).join('')}
          </div>
          <div class="ob-actions">
            <button class="ob-skip" onclick="_obNext()">Skip this</button>
            <button class="ob-next" onclick="_obSaveMoments()">Next →</button>
          </div>
        </div>`;
    }

    function _obToggleCheckItem(el) {
      el.classList.toggle('checked');
      el.querySelector('.ob-check-box').textContent = el.classList.contains('checked') ? '✓' : '';
    }

    function _obSaveMoments() {
      const checked = Array.from(document.querySelectorAll('.ob-check-item.checked')).map(el => el.dataset.val);
      if (!currentEvent.clientPrefs) currentEvent.clientPrefs = {};
      currentEvent.clientPrefs.moments = checked;
      if (checked.length) saveEvent();
      _obNext();
    }

    function _obSpecial() {
      const idx = _obStepList.indexOf('special');
      const isLast = idx === _obStepList.length - 1;
      const cur = (currentEvent.clientPrefs && currentEvent.clientPrefs.specialRequests) || '';
      document.getElementById('contentArea').innerHTML = `
        <div class="ob-wrap">
          ${_obDots(idx)}
          <div class="ob-question">Anything we should know going in?</div>
          <div class="ob-sub">Special requests, things that are off-limits, details that make this yours. No wrong answers.</div>
          <textarea class="ob-textarea-large" id="obSpecial" placeholder="Examples: no chicken dance, groom is hard of hearing, we want cold sparklers for the grand entrance...">${cur}</textarea>
          <div class="ob-actions">
            <button class="ob-skip" onclick="_obComplete(false)">Skip, I'm done</button>
            <button class="ob-next" onclick="_obSaveSpecial()">Finish ✓</button>
          </div>
        </div>`;
      requestAnimationFrame(() => document.getElementById('obSpecial').focus());
    }

    function _obSaveSpecial() {
      const val = document.getElementById('obSpecial').value.trim();
      if (val) {
        if (!currentEvent.clientPrefs) currentEvent.clientPrefs = {};
        currentEvent.clientPrefs.specialRequests = val;
        saveEvent();
      }
      _obComplete(false);
    }

    function _obComplete(skipped) {
      currentEvent.onboardingComplete = true;
      // Double-persist: localStorage ensures the flag survives fresh logins on this device
      // even if the Supabase RPC doesn't echo onboardingComplete back.
      try { localStorage.setItem('bs_ob_done_' + currentEvent.id, '1'); } catch(e) {}
      saveEvent();
      // Restore tab bar
      document.getElementById('tabBar').style.display = '';
      if (!skipped) {
        document.getElementById('contentArea').innerHTML = `
          <div class="ob-complete-wrap">
            <div class="ob-welcome-title">All set.</div>
            <div class="ob-welcome-body" style="max-width:320px;margin:0 auto 0;">Everything's saved. You can update any of it from the tabs above — your event details, your music, your timeline, all of it. We've got it from here.</div>
          </div>`;
        setTimeout(() => setActiveTab('my-event'), 1800);
      } else {
        setActiveTab('my-event');
      }
    }

    // Initialize on load
    window.addEventListener('load', init);

    // ── AUTO-SYNC: save client event data to Supabase automatically ──────────────
    // Runs every 90 seconds AND immediately when the user switches away from the tab.
    // This prevents data loss if the client closes the browser without hitting Save.
    let _autoSavePending = false;

    function _captureAndSave() {
      // BUG FIX: BSPortal is always defined — check getCurrentUser() instead
      if (!currentEvent || !BSPortal.getCurrentUser() || !BSPortal.saveClientEvent) return;
      // Also keep localStorage backup current
      try { localStorage.setItem('bs_event_draft_' + currentEvent.id, JSON.stringify(currentEvent)); } catch(e) {}
      BSPortal.saveClientEvent(currentEvent).then(function(ok) {
        if (!ok) showSaveErrorPill(function() { _captureAndSave(); });
      }).catch(function() { showSaveErrorPill(function() { _captureAndSave(); }); });
    }

    // Periodic save: every 90 seconds while on the page
    setInterval(_captureAndSave, 90 * 1000);

    // Visibility change: save the moment the user switches tabs or minimizes
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'hidden') _captureAndSave();
    });

    // Beforeunload: best-effort sync on close (may be blocked by browser)
    window.addEventListener('beforeunload', function() {
      if (!currentEvent || typeof BSPortal === 'undefined' || !BSPortal.saveClientEvent) return;
      // Use sendBeacon for reliable delivery on page unload
      const email = BSPortal.getCurrentUser && BSPortal.getCurrentUser()?.email;
      const pw    = (window._bsSession && window._bsSession.portalPw);
      if (email && pw) {
        const body = JSON.stringify({ p_email: email.toLowerCase(), p_password: pw, p_event_data: currentEvent });
        navigator.sendBeacon(
          'https://jkdhkwcxnwpiufeyrnso.supabase.co/rest/v1/rpc/update_client_event',
          new Blob([body], { type: 'application/json' })
        );
      }
    });

    // ============ CLIENT-SIDE DOCUMENT SIGNING ============
    let _clientSigCanvas = null;
    let _clientSigCtx    = null;
    let _clientSigDocIdx = null;
    let _clientSigDrawing = false;

    function openClientSignModal(docIdx) {
      _clientSigDocIdx = docIdx;
      const doc = (currentEvent.documents || [])[docIdx];
      if (!doc) return;
      document.getElementById('clientSignDocTitle').textContent = doc.label || doc.name || 'Document';
      document.getElementById('clientSignModal').style.display = 'flex';
      // Init canvas
      _clientSigCanvas = document.getElementById('clientSignCanvas');
      _clientSigCtx    = _clientSigCanvas.getContext('2d');
      _clientSigCtx.clearRect(0, 0, _clientSigCanvas.width, _clientSigCanvas.height);
      _clientSigCtx.lineWidth   = 2.5;
      _clientSigCtx.lineCap     = 'round';
      _clientSigCtx.strokeStyle = '#ffffff';
      _clientSigDrawing = false;
      // Mouse events
      _clientSigCanvas.onmousedown = (e) => { _clientSigDrawing = true; _clientSigCtx.beginPath(); const r=_clientSigCanvas.getBoundingClientRect(); _clientSigCtx.moveTo(e.clientX-r.left,e.clientY-r.top); };
      _clientSigCanvas.onmousemove = (e) => { if (!_clientSigDrawing) return; const r=_clientSigCanvas.getBoundingClientRect(); _clientSigCtx.lineTo(e.clientX-r.left,e.clientY-r.top); _clientSigCtx.stroke(); };
      _clientSigCanvas.onmouseup   = () => { _clientSigDrawing = false; };
      _clientSigCanvas.onmouseleave= () => { _clientSigDrawing = false; };
      // Touch events
      _clientSigCanvas.ontouchstart = (e) => { e.preventDefault(); _clientSigDrawing = true; _clientSigCtx.beginPath(); const r=_clientSigCanvas.getBoundingClientRect(); const t=e.touches[0]; _clientSigCtx.moveTo(t.clientX-r.left,t.clientY-r.top); };
      _clientSigCanvas.ontouchmove  = (e) => { e.preventDefault(); if (!_clientSigDrawing) return; const r=_clientSigCanvas.getBoundingClientRect(); const t=e.touches[0]; _clientSigCtx.lineTo(t.clientX-r.left,t.clientY-r.top); _clientSigCtx.stroke(); };
      _clientSigCanvas.ontouchend   = () => { _clientSigDrawing = false; };
    }

    function clearClientSignature() {
      if (_clientSigCtx && _clientSigCanvas) _clientSigCtx.clearRect(0, 0, _clientSigCanvas.width, _clientSigCanvas.height);
    }

    function closeClientSignModal() {
      document.getElementById('clientSignModal').style.display = 'none';
      _clientSigDocIdx = null;
    }

    function saveClientSignature() {
      if (!_clientSigCanvas || _clientSigDocIdx === null) return;
      const px = _clientSigCtx.getImageData(0, 0, _clientSigCanvas.width, _clientSigCanvas.height).data;
      const hasContent = Array.from(px).some(v => v !== 0);
      if (!hasContent) { showClientToast('Please draw your signature first.'); return; }
      const sig = _clientSigCanvas.toDataURL('image/png');
      if (!currentEvent.documents) currentEvent.documents = [];
      const doc = currentEvent.documents[_clientSigDocIdx];
      if (!doc) return;
      doc.clientSignature  = sig;
      doc.clientSignedAt   = new Date().toISOString();
      doc.clientSignedName = currentUser?.name || currentUser?.firstName || 'Client';
      saveEvent();
      closeClientSignModal();
      showClientToast('Document signed successfully!');
      renderClientDocuments();
    }
  </script>

  <!-- Client Signature Modal -->
  <div id="clientSignModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);z-index:3000;align-items:center;justify-content:center;">
    <div style="background:#111118;border:1px solid rgba(31,163,224,0.25);border-radius:14px;padding:28px 24px;width:480px;max-width:94vw;box-shadow:0 24px 80px rgba(0,0,0,0.7);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.04em;">Sign Document</div>
        <button onclick="closeClientSignModal()" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:22px;cursor:pointer;line-height:1;padding:0;">×</button>
      </div>
      <div id="clientSignDocTitle" style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:18px;"></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:10px;">Draw your signature below</div>
      <canvas id="clientSignCanvas" width="432" height="140" style="width:100%;height:140px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:crosshair;touch-action:none;"></canvas>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap;gap:10px;">
        <button onclick="clearClientSignature()" style="padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif;">Clear</button>
        <div style="display:flex;gap:8px;">
          <button onclick="closeClientSignModal()" style="padding:8px 16px;background:none;border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif;">Cancel</button>
          <button onclick="saveClientSignature()" style="padding:8px 20px;background:#1FA3E0;border:none;border-radius:7px;color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif;">Confirm Signature</button>
        </div>
      </div>
      <p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:14px;line-height:1.5;">By clicking "Confirm Signature" you confirm this is your authorized signature for this document.</p>
    </div>
  </div>
</body>
</html>
