<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baseline Studio - Your Event</title>
  <script src="portal-supabase.js?v=11"></script>
  <script src="lighting-preview.js?v=2"></script>
  <link rel="stylesheet" href="fonts/fonts.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --dark-bg: #08080e;
      --card-bg: #111118;
      --border-color: rgba(255, 255, 255, 0.07);
      --cyan: #1FA3E0;
      --cyan-dark: #1585b8;
      --cyan-light: rgba(31, 163, 224, 0.1);
      --white: #ffffff;
      --gray: #888888;
      --gray-light: rgba(255, 255, 255, 0.8);
      --success: #2ecc71;
      --warning: #f39c12;
      --font-head: 'Anton', Impact, sans-serif;
      --font-body: 'Barlow', system-ui, sans-serif;
      --font-condensed: 'Barlow Condensed', 'Barlow', system-ui, sans-serif;
      --glow-cyan: 0 0 32px rgba(31,163,224,0.35);
      --card-shadow: 0 4px 40px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--dark-bg);
      color: var(--white);
      line-height: 1.6;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top Navigation */
    .top-nav {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .nav-center {
      flex: 1;
      text-align: center;
      font-family: var(--font-head);
      font-size: 20px;
      color: var(--white);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .profile-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--cyan);
      color: var(--dark-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
    }

    .profile-avatar:hover {
      background: var(--cyan-dark);
    }

    .nav-right {
      position: relative;
    }

    .profile-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: rgba(17, 17, 24, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(31, 163, 224, 0.2);
      border-radius: 10px;
      padding: 6px;
      display: none;
      z-index: 500;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      transform: translateY(-6px);
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .profile-menu.active {
      display: block;
      animation: menuSlideIn 0.18s ease forwards;
    }

    @keyframes menuSlideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profile-menu-header {
      padding: 10px 12px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 4px;
    }

    .profile-menu-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-menu-event {
      font-size: 11px;
      color: var(--cyan);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-menu button {
      width: 100%;
      text-align: left;
      padding: 9px 12px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font-body);
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-menu button:hover {
      background: var(--cyan-light);
      color: var(--white);
    }

    .profile-menu button.danger:hover {
      background: rgba(231, 76, 60, 0.12);
      color: #e74c3c;
    }

    /* Password change modal */
    .pw-modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .pw-modal-backdrop.active {
      display: flex;
    }

    .pw-modal {
      background: #111118;
      border: 1px solid rgba(31,163,224,0.2);
      border-radius: 14px;
      padding: 28px 24px;
      width: 340px;
      max-width: 90vw;
      box-shadow: 0 16px 48px rgba(0,0,0,0.7);
      animation: scaleIn 0.18s ease forwards;
    }

    @keyframes scaleIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .pw-modal h3 {
      font-family: var(--font-head);
      font-size: 18px;
      margin-bottom: 18px;
    }

    .pw-modal label {
      display: block;
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 4px;
      margin-top: 14px;
    }

    .pw-modal input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: var(--white);
      padding: 9px 12px;
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }

    .pw-modal input:focus { border-color: var(--cyan); }

    .pw-modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .pw-modal-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-body);
      transition: background 0.2s;
    }

    .pw-btn-save {
      background: var(--cyan);
      color: var(--dark-bg);
    }

    .pw-btn-save:hover { background: var(--cyan-dark); }

    .pw-btn-cancel {
      background: rgba(255,255,255,0.07);
      color: var(--white);
    }

    .pw-btn-cancel:hover { background: rgba(255,255,255,0.12); }

    .logout-btn {
      padding: 8px 16px;
      background: var(--cyan);
      color: var(--dark-bg);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: var(--cyan-dark);
    }

    /* Tab Bar */
    .tab-bar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      overflow-x: auto;
      gap: 0;
      padding: 0 24px;
      flex-shrink: 0;
      height: 52px;
    }

    .tab-bar::-webkit-scrollbar {
      height: 4px;
    }

    .tab-bar::-webkit-scrollbar-thumb {
      background: var(--cyan-light);
      border-radius: 2px;
    }

    .tab {
      padding: 16px 20px;
      white-space: nowrap;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      color: var(--gray);
      flex-shrink: 0;
    }

    .tab:hover {
      color: var(--white);
    }

    .tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    /* ── G: 21st.dev-style interaction polish ────────────────────────────── */

    /* Animated tab underline — slides between tabs */
    .tab-bar {
      position: relative;
    }
    .tab-ink {
      position: absolute;
      bottom: 0;
      height: 3px;
      background: var(--cyan);
      border-radius: 2px 2px 0 0;
      transition: left 0.25s cubic-bezier(0.4,0,0.2,1), width 0.25s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }

    /* Card hover lift */
    .card {
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }

    /* Skeleton shimmer */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .skeleton-line { height: 14px; margin-bottom: 10px; }
    .skeleton-line.wide { width: 85%; }
    .skeleton-line.med  { width: 60%; }
    .skeleton-line.short{ width: 35%; }

    /* Scale-in modals (pw modal uses .pw-modal already has scaleIn; apply to all modals) */
    .card {
      animation: cardIn 0.22s ease forwards;
    }
    @keyframes cardIn {
      from { transform: translateY(10px) scale(0.98); }
      to   { transform: translateY(0)   scale(1);    }
    }

    /* Number ticker */
    .ticker {
      display: inline-block;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Quick-add chips with inline expand ──────────────────────────────── */
    .qc-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(31,163,224,0.07);
      border: 1px solid rgba(31,163,224,0.2);
      color: rgba(255,255,255,0.7);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, border-radius 0.2s;
      white-space: nowrap;
      vertical-align: middle;
    }
    .qc-chip:hover {
      background: rgba(31,163,224,0.15);
      border-color: rgba(31,163,224,0.45);
      color: #fff;
    }
    .qc-chip.expanded {
      background: rgba(31,163,224,0.1);
      border-color: rgba(31,163,224,0.45);
      border-radius: 10px;
      padding: 4px 6px 4px 12px;
      cursor: default;
      gap: 8px;
      color: rgba(255,255,255,0.9);
    }
    .qc-chip.expanded:hover { background: rgba(31,163,224,0.1); }
    .qc-time-badge {
      font-size: 10px;
      color: #1FA3E0;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: .02em;
    }
    .qc-time-input {
      width: 96px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 3px 7px;
      color: #1FA3E0;
      font-size: 12px;
      font-family: var(--font-body);
      margin-bottom: 0;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .qc-time-input:focus {
      outline: none;
      border-color: rgba(31,163,224,0.5);
      box-shadow: 0 0 0 2px rgba(31,163,224,0.12);
      background: rgba(31,163,224,0.06);
    }
    .qc-confirm {
      background: rgba(31,163,224,0.18);
      border: 1px solid rgba(31,163,224,0.4);
      color: #1FA3E0;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .qc-confirm:hover {
      background: rgba(31,163,224,0.32);
      border-color: #1FA3E0;
      color: #fff;
    }
    .qc-cancel {
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      font-size: 14px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      font-family: var(--font-body);
      transition: color 0.15s;
    }
    .qc-cancel:hover { color: rgba(255,255,255,0.6); }

    /* ── Timeline rows — refined ─────────────────────────────────────────── */
    .tl-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      position: relative;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .tl-row:hover { background: rgba(255,255,255,0.03); }
    .tl-row:hover .tl-delete { opacity: 1; }
    .tl-dot {
      position: absolute;
      left: -20px;
      top: 50%;
      transform: translateY(-50%);
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #1FA3E0;
      box-shadow: 0 0 7px rgba(31,163,224,0.55);
      flex-shrink: 0;
    }
    .tl-time {
      font-size: 13px;
      font-weight: 600;
      color: #1FA3E0;
      min-width: 62px;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .tl-time:hover {
      border-color: rgba(31,163,224,0.3);
      background: rgba(31,163,224,0.07);
    }
    .tl-time-edit {
      width: 90px;
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid rgba(31,163,224,0.4);
      background: rgba(31,163,224,0.07);
      color: #1FA3E0;
      font-size: 13px;
      font-family: var(--font-body);
      margin-bottom: 0;
    }
    .tl-label {
      flex: 1;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }
    .tl-delete {
      opacity: 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s, opacity 0.15s;
    }
    .tl-delete:hover { color: #e74c3c; }

    /* Mouse-tracked spotlight on cards */
    .card {
      --x: 50%;
      --y: 50%;
      background-image: radial-gradient(circle 220px at var(--x) var(--y), rgba(31,163,224,0.06) 0%, transparent 70%);
    }

    /* Main Content */
    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 40px 24px;
    }

    .content-area::-webkit-scrollbar {
      width: 8px;
    }

    .content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-area::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    .content-area::-webkit-scrollbar-thumb:hover {
      background: var(--gray);
    }

    .tab-content {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards & Components */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
      box-sizing: border-box;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }
    /* Enhancements form fix */
    .enhancement-section { border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 16px; margin-bottom: 16px; }
    .enhancement-section:last-of-type { border-bottom: none; }
    .enhancement-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .enhancement-color-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .enhancement-color-row input[type="color"] { width: 36px; height: 36px; border-radius: 6px; border: none; cursor: pointer; padding: 2px; background: transparent; flex-shrink: 0; }
    .enhancement-color-row input[type="text"] { flex: 1; min-width: 80px; max-width: 120px; }
    .enhancement-checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 10px; }
    .enhancement-options { padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 4px; }
    .enhancement-options label { font-size: 12px; color: var(--gray); display: block; margin-bottom: 6px; margin-top: 10px; }
    .enhancement-options label:first-child { margin-top: 0; }
    .enhancement-options input[type="text"],
    .enhancement-options textarea { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 6px; padding: 8px; font-family: inherit; font-size: 13px; }
    .enhancement-options textarea { resize: vertical; }

    .card.hero {
      background: linear-gradient(135deg, rgba(31, 163, 224, 0.1) 0%, rgba(31, 163, 224, 0.05) 100%);
      border: 2px solid var(--cyan);
      padding: 32px;
    }

    h1 {
      font-family: var(--font-head);
      font-size: 48px;
      line-height: 1;
      margin-bottom: 12px;
      color: var(--white);
    }

    h2 {
      font-family: var(--font-head);
      font-size: 24px;
      margin-bottom: 16px;
      color: var(--white);
    }

    h3 {
      font-family: var(--font-head);
      font-size: 18px;
      margin-bottom: 12px;
      color: var(--white);
    }

    p {
      color: var(--gray-light);
      margin-bottom: 12px;
    }

    .countdown-number {
      font-family: var(--font-head);
      font-size: 72px;
      color: var(--cyan);
      line-height: 1;
      margin: 16px 0;
    }

    .countdown-label {
      font-size: 14px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .badge-type {
      background: var(--cyan-light);
      color: var(--cyan);
    }

    .badge-status {
      background: rgba(46, 204, 113, 0.2);
      color: var(--success);
    }

    .badge-status.due {
      background: rgba(243, 156, 18, 0.2);
      color: var(--warning);
    }

    .status-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .team-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .team-member {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .team-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--cyan);
      color: var(--dark-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
      flex-shrink: 0;
    }

    .team-info {
      flex: 1;
    }

    .team-name {
      font-weight: 600;
      color: var(--white);
    }

    .team-role {
      font-size: 12px;
      color: var(--gray);
    }

    /* Help Section */
    .help-section {
      background: var(--cyan-light);
      border: 1px solid var(--cyan);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .help-section h3 {
      color: var(--cyan);
      margin-bottom: 8px;
    }

    .help-section p {
      margin: 8px 0;
      color: var(--white);
    }

    .help-phone {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--cyan);
      margin: 12px 0;
    }

    /* Tabs within sections */
    .sub-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0;
    }

    .sub-tab {
      padding: 12px 16px;
      background: transparent;
      border: none;
      color: var(--gray);
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }

    .sub-tab:hover {
      color: var(--white);
    }

    .sub-tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .sub-content {
      display: none;
    }

    .sub-content.active {
      display: block;
    }

    /* Forms — 21st.dev glass aesthetic */
    input, textarea, select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--white);
      padding: 11px 14px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      margin-bottom: 12px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input:hover, textarea:hover, select:hover {
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(31,163,224,0.6);
      background: rgba(31,163,224,0.04);
      box-shadow: 0 0 0 3px rgba(31,163,224,0.12);
    }

    /* Override for non-text inputs — must not inherit width:100% or box styling */
    input[type="checkbox"],
    input[type="radio"] {
      width: auto;
      flex-shrink: 0;
      padding: 0;
      margin-bottom: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      accent-color: var(--cyan);
    }

    input[type="time"] {
      padding: 8px 10px;
      margin-bottom: 0;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.25);
    }

    select option {
      background: #111;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--white);
      font-size: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .color-inputs {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 12px;
    }

    input[type="color"] {
      width: 60px;
      height: 44px;
      padding: 4px;
      cursor: pointer;
    }

    /* Buttons — 21st.dev refined */
    button, .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: var(--cyan);
      color: #07111a;
      box-shadow: 0 0 0 0 rgba(31,163,224,0);
    }

    .btn-primary:hover {
      background: #29b3f0;
      box-shadow: 0 4px 16px rgba(31,163,224,0.3);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(31,163,224,0.07);
      border: 1px solid rgba(31,163,224,0.3);
      color: var(--cyan);
    }

    .btn-secondary:hover {
      background: rgba(31,163,224,0.15);
      border-color: rgba(31,163,224,0.55);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid rgba(244, 67, 54, 0.5);
      color: rgba(244, 67, 54, 0.8);
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-danger:hover {
      background: rgba(244, 67, 54, 0.1);
    }

    /* Vendor List */
    .vendor-card {
      background: var(--dark-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: start;
    }

    .vendor-suggestion {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .vendor-suggestion:last-child { border-bottom: none; }
    .vendor-suggestion:hover { background: rgba(31,163,224,0.08); }

    .vendor-info {
      flex: 1;
    }

    .vendor-name {
      font-weight: 600;
      color: var(--white);
      margin-bottom: 4px;
    }

    .vendor-type {
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 8px;
    }

    .vendor-detail {
      font-size: 13px;
      color: var(--gray-light);
      margin: 2px 0;
    }

    .vendor-actions {
      display: flex;
      gap: 8px;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 40px;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 24px;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -32px;
      top: 6px;
      width: 16px;
      height: 16px;
      background: var(--cyan);
      border-radius: 50%;
      border: 3px solid var(--card-bg);
    }

    .timeline-badge {
      display: inline-block;
      background: var(--cyan);
      color: var(--dark-bg);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .timeline-content {
      background: var(--dark-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--gray-light);
    }

    /* Messages */
    .message-thread {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
      max-height: 400px;
      overflow-y: auto;
      padding: 16px;
      background: var(--dark-bg);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.team {
      justify-content: flex-start;
    }

    .message.client {
      justify-content: flex-end;
    }

    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--cyan);
      color: var(--dark-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
      flex-shrink: 0;
    }

    .message.client .message-avatar {
      order: 2;
    }

    .message-bubble {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: 8px;
      word-wrap: break-word;
      font-size: 14px;
    }

    .message.team .message-bubble {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--gray-light);
    }

    .message.client .message-bubble {
      background: var(--cyan);
      color: var(--dark-bg);
    }

    .message-time {
      font-size: 11px;
      color: var(--gray);
      margin-top: 4px;
    }

    .message-input-area {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .message-input-area textarea {
      margin: 0;
      flex: 1;
      min-height: 60px;
    }

    /* Checkboxes */
    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .checkbox-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .checkbox-item input[type="checkbox"] {
      width: auto;
      margin: 3px 0 0 0;
      cursor: pointer;
    }

    .checkbox-label {
      cursor: pointer;
      font-size: 14px;
      color: var(--gray-light);
    }

    /* Utility */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray);
    }

    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--white);
    }

    .divider {
      height: 1px;
      background: var(--border-color);
      margin: 20px 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .top-nav {
        padding: 12px 16px;
        height: auto;
        flex-wrap: wrap;
        gap: 8px;
      }

      .nav-center {
        width: 100%;
        order: 3;
        font-size: 16px;
        padding: 8px 0;
      }

      .nav-left, .nav-right {
        flex: 1;
      }

      h1 {
        font-size: 32px;
      }

      h2 {
        font-size: 20px;
      }

      .countdown-number {
        font-size: 48px;
      }

      .tab-bar {
        padding: 0 12px;
      }

      .tab {
        padding: 12px 12px;
        font-size: 12px;
      }

      .content-area {
        padding: 24px 16px;
      }

      .card {
        padding: 16px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .checkbox-group {
        grid-template-columns: 1fr;
      }

      .message-bubble {
        max-width: 85%;
      }

      /* Enhancements grid → single column */
      .enhancement-grid {
        grid-template-columns: 1fr;
      }

      /* Enhancement color row wraps instead of clipping */
      .enhancement-color-row {
        flex-wrap: wrap;
      }

      /* Enhancement options inside cards — better touch targets */
      .enhancement-checkbox {
        padding: 6px 0;
      }

      /* Vendor cards stack vertically on small screens */
      .vendor-card {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
      }

      /* Nav — make the event switcher not clip */
      #eventSwitcher {
        max-width: 110px;
        font-size: 11px;
      }

      /* Timeline rows — label should truncate cleanly, not overflow */
      .tl-row {
        gap: 10px;
      }
      .tl-label {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Quick-add time badge — slightly smaller on mobile */
      .qc-time-badge {
        font-size: 9px;
      }

      /* QC chip confirm button — compact on mobile */
      .qc-confirm {
        padding: 3px 7px;
        font-size: 12px;
      }

      /* Color input row */
      .color-inputs {
        grid-template-columns: 48px 1fr;
      }

      /* Form group labels */
      .form-label {
        font-size: 11px;
      }

      /* Stat/countdown section centering */
      .countdown-number {
        font-size: 44px;
      }

      /* Lighting canvas — don't let it overflow its container */
      .lp-canvas {
        border-radius: 8px;
      }
    }

    /* ============================================================
       FACELIFT — Cinema Dark / Modern Glassmorphism
       ui-ux-pro-max: "Modern Dark (Cinema Mobile)" style applied
       Brand: Baseline Studio cyan #1FA3E0 | Anton + Barlow fonts
       easing: cubic-bezier(0.16,1,0.3,1) — expo.out throughout
       ============================================================ */

    /* 1. Cinematic base — no pure black, ambient cyan bloom at top */
    body {
      background: linear-gradient(180deg, #0b0b15 0%, #07070d 100%);
      /* background-attachment: fixed intentionally removed — broken on iOS Safari */
    }

    body::before {
      content: '';
      position: fixed;
      top: -15%;
      left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      max-width: 1200px;
      height: 55vh;
      background: radial-gradient(ellipse, rgba(31,163,224,0.07) 0%, transparent 68%);
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; }

    /* 2. Navigation — full glassmorphism */
    .top-nav {
      background: rgba(7,7,13,0.78);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 1px 0 rgba(31,163,224,0.07), 0 16px 48px rgba(0,0,0,0.45);
      height: 62px;
    }

    .nav-left {
      font-size: 17px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.95);
    }

    /* 3. Tab bar — glass */
    .tab-bar {
      background: rgba(7,7,13,0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      height: 48px;
    }

    .tab {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.025em;
      padding: 13px 18px;
      transition: color 0.22s cubic-bezier(0.16,1,0.3,1);
    }

    /* 4. Cards — cinema dark with hairline top light leak */
    .card {
      background: rgba(16,16,26,0.82);
      border: 1px solid rgba(255,255,255,0.07);
      border-top-color: rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.05) inset;
      animation: cardIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @keyframes cardIn {
      from { transform: translateY(14px) scale(0.982); }
      to   { transform: translateY(0) scale(1); }
    }

    /* 5. Hero card — dramatic cinema gradient */
    .card.hero {
      background: linear-gradient(135deg, rgba(31,163,224,0.15) 0%, rgba(12,12,22,0.95) 58%);
      border-color: rgba(31,163,224,0.2);
      border-top-color: rgba(31,163,224,0.38);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 8px 56px rgba(31,163,224,0.13), 0 1px 0 rgba(31,163,224,0.2) inset;
      position: relative;
      overflow: hidden;
    }

    .card.hero::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -8%;
      width: 55%;
      height: 160%;
      background: radial-gradient(ellipse, rgba(31,163,224,0.13) 0%, transparent 65%);
      pointer-events: none;
    }

    /* 6. Countdown — dramatic glow + pulsing ring */
    .countdown-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 24px;
      margin-bottom: 8px;
    }
    .countdown-ring {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .countdown-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--countdown-color, #1FA3E0);
      opacity: 0.45;
      animation: ringPulse 2.4s ease-in-out infinite;
      box-shadow: 0 0 32px var(--countdown-color, #1FA3E0), inset 0 0 24px rgba(0,0,0,0.3);
    }
    .countdown-ring::after {
      content: '';
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--countdown-color, #1FA3E0) 30%, transparent);
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1);   opacity: 0.45; }
      50%       { transform: scale(1.04); opacity: 0.7;  }
    }
    .countdown-number {
      font-size: 88px;
      letter-spacing: -0.02em;
      color: var(--countdown-color, #1FA3E0);
      text-shadow: 0 0 56px color-mix(in srgb, var(--countdown-color, #1FA3E0) 60%, transparent),
                   0 0 12px color-mix(in srgb, var(--countdown-color, #1FA3E0) 35%, transparent);
      line-height: 1;
      position: relative;
      z-index: 1;
    }
    .countdown-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      margin-top: 16px;
      color: color-mix(in srgb, var(--countdown-color, #1FA3E0) 70%, white);
    }

    /* 7. Headings — refined spacing */
    h1 { font-size: 54px; letter-spacing: -0.01em; }
    h2 { font-size: 26px; letter-spacing: 0.01em; }
    h3 { font-size: 18px; letter-spacing: 0.01em; }

    /* 8. Buttons — expo.out transitions, gradient + glow */
    button, .btn {
      transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
    }

    .btn-primary {
      background-image: linear-gradient(135deg, #2bbdf8 0%, #1FA3E0 55%, #1689c4 100%);
      color: #05111b;
      font-weight: 700;
      letter-spacing: 0.025em;
      box-shadow: 0 0 0 0 rgba(31,163,224,0);
    }

    .btn-primary:hover {
      background-image: linear-gradient(135deg, #38c6fc 0%, #27b0ea 55%, #1a96cc 100%);
      box-shadow: 0 4px 22px rgba(31,163,224,0.42), 0 0 0 1px rgba(31,163,224,0.25);
      transform: translateY(-2px);
    }

    .btn-primary:active {
      transform: scale(0.97) translateY(0);
      transition-duration: 0.08s;
    }

    .btn-secondary {
      background: rgba(31,163,224,0.07);
      border: 1px solid rgba(31,163,224,0.22);
    }

    .btn-secondary:hover {
      background: rgba(31,163,224,0.15);
      border-color: rgba(31,163,224,0.48);
      box-shadow: 0 0 0 3px rgba(31,163,224,0.07);
    }

    /* 9. Profile avatar */
    .profile-avatar {
      box-shadow: 0 0 0 2px rgba(31,163,224,0.35);
      transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
    }

    .profile-avatar:hover {
      transform: scale(1.07);
      box-shadow: 0 0 0 2px rgba(31,163,224,0.7), 0 0 18px rgba(31,163,224,0.28);
    }

    /* 10. Badges — uppercase pill */
    .badge {
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .badge-type {
      border: 1px solid rgba(31,163,224,0.28);
      background: rgba(31,163,224,0.1);
    }

    .badge-status { border: 1px solid rgba(46,204,113,0.28); }
    .badge-status.due { border-color: rgba(243,156,18,0.28); }

    /* 11. Team card */
    .team-card {
      background: rgba(255,255,255,0.022);
      border-color: rgba(255,255,255,0.06);
      border-radius: 12px;
      transition: background 0.2s;
    }
    .team-card:hover { background: rgba(255,255,255,0.04); }

    .team-avatar {
      box-shadow: 0 0 0 2px rgba(31,163,224,0.35), 0 0 14px rgba(31,163,224,0.14);
      font-weight: 700;
    }

    /* 12. Help section — premium glass with ambient blob */
    .help-section {
      background: linear-gradient(135deg, rgba(31,163,224,0.1) 0%, rgba(31,163,224,0.03) 100%);
      border-color: rgba(31,163,224,0.2);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }
    .help-section::before {
      content: '';
      position: absolute;
      top: -60%;
      right: -8%;
      width: 45%;
      height: 220%;
      background: radial-gradient(ellipse, rgba(31,163,224,0.1) 0%, transparent 65%);
      pointer-events: none;
    }
    .help-phone {
      font-family: var(--font-head);
      font-size: 24px;
      letter-spacing: 0.06em;
      text-shadow: 0 0 22px rgba(31,163,224,0.42);
    }

    /* 13. Vendor + enhancement cards */
    .vendor-card {
      border-radius: 12px;
      border-color: rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      transition: background 0.2s, border-color 0.2s;
    }
    .vendor-card:hover {
      background: rgba(255,255,255,0.038);
      border-color: rgba(255,255,255,0.1);
    }

    /* 14. Message bubbles */
    .message.team .message-bubble {
      border-radius: 4px 14px 14px 14px;
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
    }
    .message.client .message-bubble {
      border-radius: 14px 4px 14px 14px;
      background: linear-gradient(135deg, #2bbdf8, #1FA3E0);
    }

    /* 15. Inputs — glass refinement */
    input, textarea, select {
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.09);
    }
    input:focus, textarea:focus, select:focus {
      background: rgba(31,163,224,0.04);
      border-color: rgba(31,163,224,0.52);
      box-shadow: 0 0 0 3px rgba(31,163,224,0.1), 0 1px 0 rgba(31,163,224,0.18) inset;
    }

    /* 16. Timeline dot — cyan glow */
    .tl-dot {
      box-shadow: 0 0 10px rgba(31,163,224,0.7), 0 0 4px rgba(31,163,224,0.5);
    }

    /* 17. QC chips — refined pill */
    .qc-chip {
      border-radius: 24px;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
    }
    .qc-chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(31,163,224,0.14);
      border-color: rgba(31,163,224,0.42);
    }

    /* 18. Sub-tabs */
    .sub-tab {
      font-weight: 600;
      letter-spacing: 0.025em;
      transition: color 0.2s, border-color 0.2s;
    }

    /* 19. Enhancement section dividers */
    .enhancement-section { border-bottom-color: rgba(255,255,255,0.045); }

    /* 20. Scrollbar — hairline */
    .content-area::-webkit-scrollbar { width: 4px; }
    .content-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
    .content-area::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

    /* 21. Focus ring — brand-tinted */
    :focus-visible {
      outline: 2px solid rgba(31,163,224,0.55);
      outline-offset: 2px;
    }

    /* 22. Empty state */
    .empty-state { padding: 64px 20px; }

    /* ═══════════════════════════════════════════════════════════════════
       COMPREHENSIVE MOBILE PASS — no crowding, no overflow, no clipping
       Overrides ALL previous @media blocks. Source of truth for mobile.
       ═══════════════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      /* Ambient glow — off on mobile (perf + visual noise) */
      body::before { display: none; }
      .card.hero::before { display: none; }
      .help-section::before { display: none; }

      /* Disable hover transforms on touch */
      .btn-primary:hover { transform: none; box-shadow: none; }
      .card:hover { transform: none; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }

      /* ── Navigation ─────────────────────────────────────────────── */
      .top-nav {
        padding: 0 14px;
        height: 54px;
        flex-wrap: nowrap; /* keep it single row — no wrapping */
        gap: 0;
      }
      .nav-left { font-size: 14px; letter-spacing: 0.08em; flex-shrink: 0; }
      .nav-center {
        order: 0; /* keep in-line, don't drop to new row */
        width: auto;
        font-size: 13px;
        text-align: center;
        flex: 1;

  <script>
    // ============ UTILITIES ============
    // getDB / setDB are provided by portal-supabase.js (Supabase-backed in-memory cache).
    // The client portal only reads event data — no writes needed — so these are pass-throughs.

    // ─── Toast notification ───────────────────────────────────────────────────
    function showToast(msg, type) {
      const colours = { success: '#2ecc71', error: '#e74c3c', warning: '#f39c12', info: '#1FA3E0' };
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:8px;font-size:13px;font-family:var(--font-body);font-weight:500;color:#fff;background:${colours[type]||colours.info};box-shadow:0 4px 20px rgba(0,0,0,0.5);opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;`;
      document.body.appendChild(t);
      requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateY(0)'; });
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; setTimeout(() => t.remove(), 250); }, 3000);
    }

    // ─── 24h → 12h display ───────────────────────────────────────────────────
    function fmt24to12(t) {
      if (!t || t === 'TBD') return t || 'TBD';
      const [hStr, mStr] = (t + '').split(':');
      let h = parseInt(hStr, 10);
      if (isNaN(h)) return t;
      const m = (mStr || '00').padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      if (h === 0) h = 12; else if (h > 12) h -= 12;
      return `${h}:${m} ${ampm}`;
    }

    // ─── Quick-add chip expand / confirm / cancel ─────────────────────────────
    function expandChip(btn) {
      if (btn.classList.contains('expanded')) return;
      const label = btn.dataset.label || '';
      const time  = btn.dataset.time  || '';
      btn.classList.add('expanded');
      btn.innerHTML = `
        <span style="font-size:12px;font-weight:500;">${label}</span>
        <input type="time" class="qc-time-input" value="${time}" onkeydown="if(event.key==='Enter')confirmChipAdd(this.parentElement);if(event.key==='Escape')collapseChip(this.parentElement);" onclick="event.stopPropagation();">
        <button class="qc-confirm" onclick="confirmChipAdd(this.parentElement);">✓ Add</button>
        <button class="qc-cancel"  onclick="collapseChip(this.parentElement);">✕</button>
      `;
      // Re-set data so collapseChip can restore it
      btn.dataset.label = label;
      btn.dataset.time  = time;
      requestAnimationFrame(() => btn.querySelector('.qc-time-input')?.focus());
    }

    function confirmChipAdd(btn) {
      const label    = btn.dataset.label || '';
      const timeInput = btn.querySelector('.qc-time-input');
      const time      = timeInput ? timeInput.value || btn.dataset.time : btn.dataset.time;
      addSuggestedMoment(label, time);
    }

    function collapseChip(btn) {
      const label = btn.dataset.label || '';
      const time  = btn.dataset.time  || '';
      btn.classList.remove('expanded');
      btn.innerHTML = `<span>+ ${label}</span><span class="qc-time-badge">${fmt24to12(time)}</span>`;
    }

    // ─── Inline timeline time editing ─────────────────────────────────────────
    function editTimelineTime(idx, currentTime) {
      const row = document.querySelector(`.tl-row[data-tl-idx="${idx}"]`);
      if (!row) return;
      const timeEl = row.querySelector('.tl-time');
      if (!timeEl) return;
      const input = document.createElement('input');
      input.type = 'time';
      input.value = currentTime;
      input.className = 'tl-time-edit';

      const save = () => {
        if (currentEvent.timeline && currentEvent.timeline[idx] !== undefined) {
          currentEvent.timeline[idx].time = input.value || currentTime;
          saveEvent();
        }
        renderTimeline();
      };

      input.addEventListener('blur',    save);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); save(); }
        if (e.key === 'Escape') renderTimeline();
      });
      input.addEventListener('click', e => e.stopPropagation());

      timeEl.replaceWith(input);
      requestAnimationFrame(() => input.focus());
    }

    // ─── Number ticker (count-up animation) ──────────────────────────────────
    function tickerCountUp(el, target, durationMs) {
      if (!el) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { el.textContent = target; return; }
      const start = performance.now();
      const startVal = 0;
      function step(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / (durationMs || 900), 1);
        const ease = 1 - Math.pow(1 - progress, 3); // ease-out-cubic
        el.textContent = Math.round(startVal + (target - startVal) * ease);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'TBD';
      const date = new Date(dateStr);
      const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
      return date.toLocaleDateString('en-US', options);
    }

    function getDayCount(dateStr) {
      if (!dateStr) return 0;
      const eventDate = new Date(dateStr);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      eventDate.setHours(0, 0, 0, 0);
      const diff = eventDate - today;
      return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
    }

    let _menuOutsideHandler = null;
    let _menuEscHandler = null;

    function toggleProfileMenu() {
      const menu = document.getElementById('profileMenu');
      const isOpen = menu.classList.contains('active');
      if (isOpen) {
        closeProfileMenu();
      } else {
        menu.classList.add('active');
        // Outside click
        setTimeout(() => {
          _menuOutsideHandler = (e) => {
            if (!e.target.closest('.profile-avatar') && !e.target.closest('.profile-menu')) {
              closeProfileMenu();
            }
          };
          document.addEventListener('click', _menuOutsideHandler);
        }, 0);
        // Esc key
        _menuEscHandler = (e) => { if (e.key === 'Escape') closeProfileMenu(); };
        document.addEventListener('keydown', _menuEscHandler);
      }
    }

    function closeProfileMenu() {
      const menu = document.getElementById('profileMenu');
      menu.classList.remove('active');
      if (_menuOutsideHandler) { document.removeEventListener('click', _menuOutsideHandler); _menuOutsideHandler = null; }
      if (_menuEscHandler) { document.removeEventListener('keydown', _menuEscHandler); _menuEscHandler = null; }
    }

    function openChangePassword() {
      closeProfileMenu();
      document.getElementById('pwCurrent').value = '';
      document.getElementById('pwNew').value = '';
      document.getElementById('pwConfirm').value = '';
      document.getElementById('pwFeedback').textContent = '';
      document.getElementById('pwModalBackdrop').classList.add('active');
      setTimeout(() => document.getElementById('pwCurrent').focus(), 100);
      // Esc closes modal
      const onEsc = (e) => { if (e.key === 'Escape') { closePwModal(); document.removeEventListener('keydown', onEsc); } };
      document.addEventListener('keydown', onEsc);
    }

    function closePwModal(e) {
      if (e && e.type === 'click' && e.target !== document.getElementById('pwModalBackdrop')) return;
      document.getElementById('pwModalBackdrop').classList.remove('active');
    }

    async function submitChangePassword() {
      const cur  = document.getElementById('pwCurrent').value.trim();
      const nw   = document.getElementById('pwNew').value.trim();
      const conf = document.getElementById('pwConfirm').value.trim();
      const fb   = document.getElementById('pwFeedback');
      fb.style.color = '#e74c3c';
      if (!cur) { fb.textContent = 'Enter your current password.'; return; }
      if (nw.length < 6) { fb.textContent = 'New password must be at least 6 characters.'; return; }
      if (nw !== conf) { fb.textContent = 'Passwords do not match.'; return; }
      const btn = document.querySelector('.pw-btn-save');
      btn.textContent = 'Updating...';
      btn.disabled = true;
      try {
        const SUPABASE_URL  = 'https://jkdhkwcxnwpiufeyrnso.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_6xcEpHwIJi8bq4XuSyLCGg_3A30raS9';
        const userEmail = (currentUser && currentUser.email) || '';
        const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/change_client_password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
          body: JSON.stringify({ p_email: userEmail, p_old_password: cur, p_new_password: nw })
        });
        const result = await r.json();
        if (result === true) {
          // Update the session's stored password so further saves still work
          if (window.BSPortal && BSPortal._updateSessionPw) BSPortal._updateSessionPw(nw);
          fb.style.color = 'var(--success)';
          fb.textContent = 'Password updated. You\'re set.';
          setTimeout(() => document.getElementById('pwModalBackdrop').classList.remove('active'), 1800);
        } else {
          fb.textContent = 'Current password is incorrect.';
        }
      } catch(err) {
        fb.textContent = 'Something went wrong. Try again.';
      }
      btn.textContent = 'Update';
      btn.disabled = false;
    }

    function logout() {
      BSPortal.logout(); // clears session + redirects to login
    }

    function goHome() {
      setActiveTab('my-event');
    }

    // ============ STATE ============
    let currentUser = null;
    let currentEvent = null;
    let activeTab = 'my-event';

    // ============ INITIALIZATION ============
    function init() {
      // Check session (stored in sessionStorage by login.html via BSPortal.signInClient)
      const sessionEvent = BSPortal.initClient(); // redirects to login if no valid session
      if (!sessionEvent) return;

      currentUser = BSPortal.getCurrentUser();

      // Check role
      if (!['client-private', 'client-corporate'].includes(currentUser.role)) {
        window.location.href = 'login.html';
        return;
      }

      // Event data was stored in the session at login time — no extra Supabase call needed
      currentEvent = sessionEvent;

      if (!currentEvent) {
        renderEmptyState();
        return;
      }

      // Normalize field names — seed sources use slightly different keys
      currentEvent.name = currentEvent.name || currentEvent.title || currentEvent.eventName || 'My Event';
      currentEvent.type = currentEvent.type || currentEvent.eventType || 'event';
      currentEvent.venueName = currentEvent.venueName || currentEvent.venue || 'TBD';
      currentEvent.date = currentEvent.date || currentEvent.eventDate || '';
      currentEvent.basePrice = currentEvent.basePrice || currentEvent.budget || 0;
      currentEvent.depositAmount = currentEvent.depositAmount || Math.round((currentEvent.basePrice || 0) * 0.5);
      currentEvent.depositPaid = currentEvent.depositPaid ?? (currentEvent.paid > 0);
      currentEvent.balancePaid = currentEvent.balancePaid ?? false;

      // Set nav — show event name, plus switcher if client has multiple events
      const allEvents = BSPortal.getClientAllEvents ? BSPortal.getClientAllEvents() : [currentEvent];
      document.getElementById('eventNameText').textContent = currentEvent.name;
      if (allEvents.length > 1) {
        const sel = document.getElementById('eventSwitcher');
        sel.style.display = 'inline-block';
        sel.innerHTML = allEvents.map(ev => {
          const d = ev.date || ev.eventDate || '';
          const yr = d ? ' (' + d.slice(0,4) + ')' : '';
          return `<option value="${ev.id}" ${ev.id === currentEvent.id ? 'selected' : ''}>${ev.name}${yr}</option>`;
        }).join('');
      }
      const initial = (currentUser.firstName || currentUser.name || 'U')[0].toUpperCase();
      document.getElementById('profileInitial').textContent = initial;
      // Populate profile menu header
      const displayName = currentUser.name || currentUser.email || 'Client';
      document.getElementById('menuClientName').textContent = displayName;
      document.getElementById('menuEventName').textContent = currentEvent.name || 'My Event';

      // Show skeleton shimmer briefly while content renders
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div style="padding:24px;display:flex;flex-direction:column;gap:16px;">
          <div class="skeleton skeleton-line wide" style="height:32px;"></div>
          <div class="skeleton skeleton-line med" style="height:20px;"></div>
          <div class="skeleton skeleton-line short" style="height:20px;"></div>
          <div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="skeleton" style="height:120px;border-radius:12px;"></div>
            <div class="skeleton" style="height:120px;border-radius:12px;"></div>
          </div>
        </div>`;

      // Render tabs and content
      requestAnimationFrame(() => {
        renderTabs();
        // Check Supabase-persisted flag first, then fall back to localStorage
        // (covers cases where the RPC doesn't echo onboardingComplete back on fresh login)
        const obDoneLocally = (() => {
          try { return !!localStorage.getItem('bs_ob_done_' + currentEvent.id); } catch(e) { return false; }
        })();
        if (!currentEvent.onboardingComplete && !obDoneLocally) {
          document.getElementById('tabBar').style.display = 'none';
          renderOnboarding();
        } else {
          // Keep the flag synced on currentEvent in case it came from localStorage only
          currentEvent.onboardingComplete = true;
          setActiveTab('my-event');
        }
      });
    }

    function switchEvent(eventId) {
      const ev = BSPortal.switchClientEvent ? BSPortal.switchClientEvent(eventId) : null;
      if (!ev) return;
      currentEvent = ev;
      // Re-normalize
      currentEvent.name = currentEvent.name || currentEvent.title || 'My Event';
      currentEvent.type = currentEvent.type || 'event';
      currentEvent.venueName = currentEvent.venueName || currentEvent.venue || 'TBD';
      currentEvent.date = currentEvent.date || currentEvent.eventDate || '';
      currentEvent.depositPaid = currentEvent.depositPaid ?? false;
      currentEvent.balancePaid = currentEvent.balancePaid ?? false;
      document.getElementById('eventNameText').textContent = currentEvent.name;
      setActiveTab('my-event');
    }

    function renderEmptyState() {
      const content = document.getElementById('contentArea');
      content.innerHTML = `
        <div class="empty-state">
          <h2>We're getting your portal ready.</h2>
          <p style="color:rgba(255,255,255,0.45);font-size:15px;margin-top:8px;">Shouldn't be long. Everything will be here soon.</p>
          <p style="margin-top: 28px; font-size: 14px; color: rgba(255,255,255,0.35);">Questions in the meantime? Call us at <span style="color:#1FA3E0;font-weight:600;">(786) 302-6056</span></p>
        </div>
      `;
    }

    function renderTabs() {
      const tabBar = document.getElementById('tabBar');
      const tabs = [
        { id: 'my-event', label: 'My Event' },
        { id: 'vendors', label: 'Vendors & Venue' },
        { id: 'timeline', label: 'Timeline' },
        { id: 'music', label: 'Music' },
        { id: 'enhancements', label: 'Enhancements' },
        { id: 'invoices', label: 'Invoices' },
        { id: 'documents', label: 'Documents' },
        { id: 'preferences', label: 'Preferences' },
        { id: 'messages', label: 'Messages' },
        { id: 'settings', label: 'Settings' }
      ];

      tabBar.innerHTML = tabs.map(tab => `
        <div class="tab" data-tab="${tab.id}" onclick="setActiveTab('${tab.id}')">
          ${tab.label}
        </div>
      `).join('') + '<div class="tab-ink" id="tabInk"></div>';
      // Position ink on initial load
      requestAnimationFrame(() => moveTabInk(activeTab));
    }

    function moveTabInk(tabId) {
      const ink = document.getElementById('tabInk');
      const tab = document.querySelector(`[data-tab="${tabId}"]`);
      if (!ink || !tab) return;
      const bar    = tab.closest('.tab-bar');
      const barRect = bar.getBoundingClientRect();
      const tabRect = tab.getBoundingClientRect();
      ink.style.left  = (tabRect.left - barRect.left + bar.scrollLeft) + 'px';
      ink.style.width = tabRect.width + 'px';
    }

    function setActiveTab(tabId) {
      activeTab = tabId;

      // Update tab bar
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
      moveTabInk(tabId);

      // Render content
      const content = document.getElementById('contentArea');
      content.innerHTML = '';

      switch (tabId) {
        case 'my-event':
          renderMyEvent();
          break;
        case 'vendors':
          renderVendors();
          break;
        case 'timeline':
          renderTimeline();
          break;
        case 'music':
          renderMusic();
          break;
        case 'enhancements':
          renderEnhancements();
          break;
        case 'invoices':
          renderClientInvoices();
          break;
        case 'documents':
          renderClientDocuments();
          break;
        case 'preferences':
          renderPreferences();
          break;
        case 'messages':
          renderMessages();
          break;
        case 'settings':
          renderClientSettings();
          break;
      }
    }

              <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:600;color:#1FA3E0;border-top:1px solid rgba(255,255,255,0.07);padding-top:8px;"><span>Balance Due</span><span>$${Math.max(0, Number(currentEvent.total) - Number(currentEvent.paid||0)).toLocaleString()}</span></div>

        <div class="help-section">

      // Urgency color — cyan 31+, gold 8–30, magenta 0–7
      const urgencyColor = dayCount <= 7 ? '#c0186e' : dayCount <= 30 ? '#d4930a' : '#1FA3E0';
      const ring = document.getElementById('countdownRing');
      if (ring) ring.style.setProperty('--countdown-color', urgencyColor);
      // Animate countdown number with count-up ticker

          </div>

          <div class="card">
            <h3>Add My Vendor</h3>

    function switchVendorTab(tab) {
      document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sub-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`button[onclick="switchVendorTab('${tab}')"]`).classList.add('active');
      document.getElementById(`${tab}-tab`).classList.add('active');
    }

    function saveVenueNotes() {
      if (!currentEvent.clientNotes) currentEvent.clientNotes = {};
      currentEvent.clientNotes.venue = document.getElementById('venueNotes').value;
      saveEvent();
      showSavedPill();
    }

    function saveParkingNotes() {
      if (!currentEvent.clientNotes) currentEvent.clientNotes = {};
      currentEvent.clientNotes.parking = document.getElementById('parkingNotes').value;
      saveEvent();
      showSavedPill();
    }

    function addVendor() {
      const type = document.getElementById('vendorType').value;
      const name = document.getElementById('vendorName').value;
      const contactName = document.getElementById('vendorContactName').value;
      const phone = document.getElementById('vendorPhone').value;
      const email = document.getElementById('vendorEmail').value;
      const notes = document.getElementById('vendorNotes').value;

      if (!type || !name) {
        showToast('Fill in vendor type and name first.', 'warning');
        return;
      }

      if (!currentEvent.clientVendors) currentEvent.clientVendors = [];
      currentEvent.clientVendors.push({ type, name, contactName, phone, email, notes });
      saveEvent();

      // Auto-add to Baseline's shared vendor library (fire-and-forget)
      if (typeof BSPortal !== 'undefined' && BSPortal.addVendorToLibrary) {
        BSPortal.addVendorToLibrary({ name, type, contactName, phone, email });
      }

      renderVendors();
    }

    // Vendor typeahead — debounced search into Baseline's vendor library
    let _vendorSearchTimer = null;
    function initVendorTypeahead() {
      const input = document.getElementById('vendorName');
      const suggestions = document.getElementById('vendorSuggestions');
      if (!input || !suggestions) return;
      input.addEventListener('input', function() {
        clearTimeout(_vendorSearchTimer);
        const q = input.value.trim();
        if (q.length < 2) { suggestions.style.display = 'none'; return; }
        _vendorSearchTimer = setTimeout(async function() {
          if (typeof BSPortal === 'undefined' || !BSPortal.searchVendors) return;
          const results = await BSPortal.searchVendors(q);
          if (!results.length) { suggestions.style.display = 'none'; return; }
          suggestions.innerHTML = results.map(v => `
            <div class="vendor-suggestion" onclick="fillVendor(${JSON.stringify(v).replace(/"/g,'&quot;')})">
              <span>${v.name}</span>
              <span style="font-size:11px;color:#1FA3E0;margin-left:8px;">Baseline has worked with them</span>
              ${v.category ? `<span style="font-size:11px;color:rgba(255,255,255,0.4);margin-left:8px;">${v.category}</span>` : ''}
            </div>`).join('');
          suggestions.style.display = 'block';
        }, 300);
      });
      document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !suggestions.contains(e.target)) {
          suggestions.style.display = 'none';
        }
      });
    }

    function fillVendor(v) {
      const nameEl = document.getElementById('vendorName');
      const contactEl = document.getElementById('vendorContactName');
      const phoneEl = document.getElementById('vendorPhone');
      const emailEl = document.getElementById('vendorEmail');
      const typeEl = document.getElementById('vendorType');
      const suggestions = document.getElementById('vendorSuggestions');
      if (nameEl) nameEl.value = v.name || '';
      if (contactEl) contactEl.value = v.contactName || '';
      if (phoneEl) phoneEl.value = v.phone || '';
      if (emailEl) emailEl.value = v.email || '';
      if (typeEl && v.category) typeEl.value = v.category;
      if (suggestions) suggestions.style.display = 'none';
    }

    function deleteVendor(idx) {
      if (confirm('Delete this vendor?')) {
        currentEvent.clientVendors.splice(idx, 1);
        saveEvent();
        renderVendors();
      }
    }

    // ============ TAB: TIMELINE ============
    const TIMELINE_SUGGESTIONS = {
      wedding:  [['Guests arrive','17:30'],['Ceremony','18:00'],['Cocktail hour','18:45'],['Grand entrance','20:00'],['First dance','20:10'],['Dinner','20:30'],['Toasts','21:15'],['Parent dances','21:30'],['Open dancefloor','21:45'],['Cake cutting','22:30'],['Last song','23:55']],
      gala:     [['Doors open','18:00'],['Cocktail reception','18:15'],['Welcome remarks','19:30'],['Dinner service','19:45'],['Program / awards','20:30'],['Live entertainment','21:15'],['Dancing','21:45'],['Event close','23:00']],
      corporate:[['Registration','17:30'],['Networking','18:00'],['Opening remarks','19:00'],['Keynote / program','19:15'],['Dinner','20:00'],['Entertainment','21:00'],['Close','22:30']],
      mitzvah:  [['Guests arrive','18:00'],['Grand entrance','18:30'],['Hora & candle lighting','19:00'],['Dinner','19:45'],['Games & dancing','20:30'],['Montage','21:30'],['Last song','22:45']],
      quince:   [['Guests arrive','18:30'],['Grand entrance','19:00'],['Waltz','19:15'],['Toast','19:45'],['Dinner','20:00'],['Surprise dance','21:00'],['Open dancefloor','21:30'],['Last song','23:30']],
      default:  [['Guests arrive','18:00'],['Kickoff','19:00'],['Dinner','20:00'],['Peak dancefloor','21:30'],['Last song','23:30']]
    };

    function getTimelineSuggestions() {
      const type = (currentEvent.type || 'default').toLowerCase();
      const suggestions = TIMELINE_SUGGESTIONS[type] || TIMELINE_SUGGESTIONS.default;
      const existing = new Set((currentEvent.timeline || []).map(t => t.label.toLowerCase()));
      return suggestions.filter(([label]) => !existing.has(label.toLowerCase()));
    }

    function addSuggestedMoment(label, time) {
      if (!currentEvent.timeline) currentEvent.timeline = [];
      currentEvent.timeline.push({ label, time });
      saveEvent();
      renderTimeline();
    }

    function addAllSuggestions() {
      if (!currentEvent.timeline) currentEvent.timeline = [];
      const toAdd = getTimelineSuggestions();
      toAdd.forEach(([label, time]) => currentEvent.timeline.push({ label, time }));
      saveEvent();
      renderTimeline();
    }

    function renderTimeline() {
      const timeline = (currentEvent.timeline || []).slice().sort(function(a,b) {
        return (a.time || '').localeCompare(b.time || '');
      });
      const content = document.getElementById('contentArea');
      const suggestions = getTimelineSuggestions();

    // ============ UTILITIES ============
    let _saveEventTimer = null;
    let _saveRetryFn = null; // stores last failed save for retry

    function saveEvent() {
      // localStorage backup: always store current state locally so nothing is lost
      try { localStorage.setItem('bs_event_draft_' + currentEvent.id, JSON.stringify(currentEvent)); } catch(e) {}

      // Debounced cloud save via SECURITY DEFINER RPC (clients have no JWT)
      clearTimeout(_saveEventTimer);
      _saveEventTimer = setTimeout(function() {
        if (typeof BSPortal === 'undefined' || !BSPortal.saveClientEvent) return;
        const snapshot = JSON.parse(JSON.stringify(currentEvent)); // freeze for retry
        _saveRetryFn = function() {
          BSPortal.saveClientEvent(snapshot).then(function(ok) {
            if (ok) { showSavedPill(); try { localStorage.removeItem('bs_event_draft_' + snapshot.id); } catch(e) {} }
            else showSaveErrorPill(_saveRetryFn);
          }).catch(function() { showSaveErrorPill(_saveRetryFn); });
        };
        BSPortal.saveClientEvent(snapshot).then(function(ok) {
          if (ok) { showSavedPill(); try { localStorage.removeItem('bs_event_draft_' + snapshot.id); } catch(e) {} }
          else showSaveErrorPill(_saveRetryFn);
        }).catch(function() { showSaveErrorPill(_saveRetryFn); });
      }, 800);
    }

    // Error pill — slides up like the saved pill but red, with a Retry button
    function showSaveErrorPill(retryFn) {
      let pill = document.getElementById('_saveErrorPill');

        pill = document.createElement('div');
        pill.id = '_saveErrorPill';
        pill.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a1a1a;border:1px solid rgba(231,76,60,0.5);color:#fff;font-family:Barlow,sans-serif;font-size:13px;padding:10px 16px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.5);transform:translateY(80px);opacity:0;transition:transform 0.3s cubic-bezier(0.22,1,0.36,1),opacity 0.3s;z-index:9999;display:flex;align-items:center;gap:12px;';
        document.body.appendChild(pill);
      }
      clearTimeout(pill._t);
      pill.innerHTML = '<span style="color:#e74c3c;">⚠ Couldn\'t save</span><button onclick="(function(){var p=document.getElementById(\'_saveErrorPill\');p.style.transform=\'translateY(80px)\';p.style.opacity=\'0\';' + (retryFn ? 'window._clientSaveRetryFn&&window._clientSaveRetryFn();' : '') + '})()" style="background:rgba(231,76,60,0.2);border:1px solid rgba(231,76,60,0.4);color:#e74c3c;font-family:Barlow,sans-serif;font-size:12px;font-weight:700;padding:4px 12px;border-radius:8px;cursor:pointer;">Retry</button>';
      window._clientSaveRetryFn = retryFn;
      pill.style.transform = 'translateY(0)';
      pill.style.opacity = '1';
      pill._t = setTimeout(function() { pill.style.transform = 'translateY(80px)'; pill.style.opacity = '0'; }, 7000);
    }

    // Animated "Saved" pill — slides in from bottom-right, hides after 2s

        pill.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1FA3E0;color:#000;font-family:Barlow,sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:100px;box-shadow:0 4px 16px rgba(31,163,224,0.4);transform:translateY(60px);opacity:0;transition:transform 0.3s cubic-bezier(0.22,1,0.36,1),opacity 0.3s;z-index:9999;pointer-events:none;';

    // ─── Mouse-tracked spotlight on cards ────────────────────────────────────
    document.addEventListener('mousemove', function(e) {
      const card = e.target.closest('.card');
      if (!card) return;
      const rect = card.getBoundingClientRect();
      card.style.setProperty('--x', (e.clientX - rect.left) + 'px');
      card.style.setProperty('--y', (e.clientY - rect.top) + 'px');
